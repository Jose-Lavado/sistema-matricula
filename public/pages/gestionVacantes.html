<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestión de Vacantes – I.E. Pedro Labarthe</title>
  <!-- GESTIÓN VACANTES: visualizar y editar cupos por sección -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="/css/sidebar.css" rel="stylesheet" />
  <link href="/css/app.css" rel="stylesheet" />
  <link href="/css/feedback.css" rel="stylesheet" />
  <link href="/css/gestionVacantes.css" rel="stylesheet" />
</head>
<body>

  <script src="/js/guard.js"></script>

  <div class="container-fluid">
    <div class="row min-vh-100">

      <div id="sidebar-container" class="col-auto p-0"></div>

      <main class="col p-0">
        <div id="topbar-container"></div>

        <div class="page-body">
          <div class="row g-3 mb-4" id="summaryCards">
            <div class="col-6 col-md-3">
              <div class="sum-card">
                <div class="sico navy"><i class="bi bi-door-closed"></i></div>
                <div>
                  <h2 class="fw-bold font-monospace mb-1" id="totalVacantes">0</h2>
                  <p>Total vacantes</p>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="sum-card">
                <div class="sico green"><i class="bi bi-door-open"></i></div>
                <div>
                  <h2 class="fw-bold font-monospace mb-1" id="disponibles">0</h2>
                  <p>Disponibles</p>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="sum-card">
                <div class="sico gold"><i class="bi bi-person-check"></i></div>
                <div>
                  <h2 class="fw-bold font-monospace mb-1" id="ocupadas">0</h2>
                  <p>Ocupadas</p>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="sum-card">
                <div class="sico red"><i class="bi bi-exclamation-triangle"></i></div>
                <div>
                  <h2 class="fw-bold font-monospace mb-1" id="criticas">0</h2>
                  <p>Secciones críticas</p>
                </div>
              </div>
            </div>
          </div>

          <div id="gradosContainer"></div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header">
          <h5 class="modal-title" id="editTitle">Editar vacantes</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">Grado</label>
              <input type="text" class="form-control" id="editGrado" readonly style="background:#f7f9fd" />
            </div>
            <div class="col-6">
              <label class="form-label">Sección</label>
              <input type="text" class="form-control" id="editSec" readonly style="background:#f7f9fd" />
            </div>
            <div class="col-6">
              <label class="form-label">Matrículas actuales</label>
              <input type="number" class="form-control" id="editOcu" readonly style="background:#f7f9fd" />
            </div>
            <div class="col-6">
              <label class="form-label">Capacidad total <span class="text-danger">*</span></label>
              <input type="number" class="form-control" id="editTotal" min="1" max="50" />
            </div>
          </div>
          <input type="hidden" id="editId" />
          <div class="alert alert-warning mt-3 border-0 rounded-3" style="font-size:.85rem;background:rgba(212,160,23,.1);color:#9a7012">
            <i class="bi bi-exclamation-triangle me-1"></i>
            El total no puede ser menor al número de matrículas registradas.
          </div>
        </div>
        <div class="modal-footer border-0">
          <button class="btn btn-sm btn-light" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-sm" style="background:var(--navy);color:#fff;border-radius:8px" onclick="saveEdit()">
            <i class="bi bi-save me-1"></i>Guardar cambios
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/gestionVacantes.js"></script>
  <script src="/js/feedback.js"></script>
  <script src="/js/notification.js"></script>
</body>
</html>
