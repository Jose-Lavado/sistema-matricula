global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "matricula-app"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:3000"]
        labels:
          app: "matricula-app"

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
